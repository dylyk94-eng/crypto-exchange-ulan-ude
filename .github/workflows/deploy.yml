name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check ──────────────────────────────────────────────────────
  ci:
    name: Lint & build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build (verify production bundle)
        run: npm run build
        env:
          # Ensure the build doesn't fail due to missing env vars
          TELEGRAM_BOT_TOKEN: DEMO_BOT_TOKEN
          TELEGRAM_CHAT_ID: '000000000'

  # ── Deploy to VPS (only on push to main) ──────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/crypto-exchange
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 reload ecosystem.config.cjs --update-env
            echo "Deploy complete: $(date)"
